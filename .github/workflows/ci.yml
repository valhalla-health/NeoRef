name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run coverage
      - run: npm run build
        env:
          # Fork PRs can't see repo secrets — fall back to non-secret
          # placeholders so the build still succeeds (these values aren't
          # secret in a security sense; they end up in the public JS bundle).
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || 'ci-placeholder.apps.googleusercontent.com' }}
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL || 'https://script.google.com/macros/s/ci-placeholder/exec' }}
