<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      black-translucent lets the app draw under the status bar/notch when
      installed to the home screen (matching viewport-fit=cover), so the
      single env(safe-area-inset-top) padding in global.css is the only
      source of top spacing — with "default" instead, iOS reserves its own
      status-bar strip AND our padding would apply, doubling the gap on
      notched models while looking fine on older ones.
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#F6EFE3" />
    <meta name="referrer" content="no-referrer" />
    <!--
      Content-Security-Policy: everything is bundled and self-hosted except two
      deliberate exceptions for Google Sign-In (script + iframe) and the GAS
      backend (fetch target) — see AuthContext/authApi/gamifyApi. Every other
      origin stays locked down. GitHub Pages cannot set HTTP headers, so this
      meta CSP is the enforcement point.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' https://accounts.google.com/gsi/client; connect-src 'self' https://accounts.google.com https://script.google.com https://script.googleusercontent.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <title>Newborn · In-Hand Reference</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
